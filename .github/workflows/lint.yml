name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "coverage/**"
      - "storybook-static/**"
      - "pentest-results/**"
      - "log/**"
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "coverage/**"
      - "storybook-static/**"
      - "pentest-results/**"
      - "log/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

